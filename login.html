<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RefundOS — Log in</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:#f8f9fb;color:#0f1115;min-height:100vh;display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased}
.wrap{width:100%;max-width:420px;padding:24px}
.logo{text-align:center;margin-bottom:40px}
.logo a{font-size:24px;font-weight:700;text-decoration:none;color:#0f1115}
.logo a em{font-style:italic;color:#4aaa78}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:36px 32px;box-shadow:0 4px 24px rgba(0,0,0,.04)}
.card h1{font-size:22px;font-weight:700;text-align:center;margin-bottom:6px}
.card .sub{font-size:13px;color:#6b7080;text-align:center;margin-bottom:28px}
.gbtn{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;padding:11px 16px;border-radius:10px;border:1px solid #e5e7eb;background:#fff;font-size:13.5px;font-weight:500;font-family:inherit;cursor:pointer;transition:all .15s;color:#2d2f36}
.gbtn:hover{background:#f3f4f6;border-color:#d1d5db}
.div{display:flex;align-items:center;gap:14px;margin:24px 0;color:#9ca3af;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.08em}
.div::before,.div::after{content:'';flex:1;height:1px;background:#e5e7eb}
.field{margin-bottom:18px}
.field label{display:block;font-size:12.5px;font-weight:600;color:#2d2f36;margin-bottom:6px}
.field input{width:100%;padding:10px 14px;border:1px solid #e5e7eb;border-radius:10px;font-size:13.5px;font-family:inherit;outline:none;transition:border-color .15s}
.field input:focus{border-color:#22c55e;box-shadow:0 0 0 3px rgba(34,197,94,.1)}
.opts{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;font-size:12px}
.opts label{display:flex;align-items:center;gap:6px;color:#6b7080;cursor:pointer}
.opts input[type=checkbox]{accent-color:#22c55e;width:14px;height:14px}
.opts a{color:#16a34a;text-decoration:none;font-weight:500}
.sbtn{width:100%;padding:12px;border-radius:10px;background:#0f1115;color:#fff;border:none;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:opacity .15s}
.sbtn:hover{opacity:.88}
.bot{text-align:center;margin-top:24px;font-size:13px;color:#6b7080}
.bot a{color:#16a34a;font-weight:500;text-decoration:none}
.bk{text-align:center;margin-top:16px}
.bk a{font-size:12px;color:#9ca3af;text-decoration:none}
.bk a:hover{color:#6b7080}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo"><a href="/">Refund<em>OS</em></a></div>
  <div class="card">
    <h1>Welcome back</h1>
    <p class="sub">Log in to your RefundOS dashboard</p>
    <button class="gbtn" onclick="location.href='dashboard.html'">
      <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Continue with Google
    </button>
    <div class="div">or</div>
    <form onsubmit="event.preventDefault();location.href='dashboard.html'">
      <div class="field"><label>Email address</label><input type="email" placeholder="you@example.com"/></div>
      <div class="field"><label>Password</label><input type="password" placeholder="Enter your password"/></div>
      <div class="opts"><label><input type="checkbox" checked/> Remember me</label><a href="#">Forgot password?</a></div>
      <button class="sbtn" type="submit">Log in</button>
    </form>
    <div class="bot">Don't have an account? <a href="dashboard.html">Start free trial</a></div>
  </div>
  <div class="bk"><a href="/">Back to RefundOS homepage</a></div>
</div>
</body>
</html>
